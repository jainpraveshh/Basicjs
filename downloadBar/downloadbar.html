<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Download Bar</title>

  <style>
    body {
      background-color: #111;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

#box {
  background-color: #222;
  padding: 30px;
  border-radius: 15px;
  border: 2px solid white;
  box-shadow: 0 0 15px rgba(255,255,255,0.2);
}
    .container {
      width: 400px;
      text-align: center;
    }

    h2 {
      margin-bottom: 10px;
    }

    button {
      padding: 10px 20px;
      background-color: orange;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    .progress-box {
      width: 100%;
      height: 30px;
      border: 2px solid white;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 20px;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background-color: limegreen;
      transition: width 0.2s ease;
    }

    .percent {
      margin-top: 10px;
      font-size: 18px;
    }
   
  </style>
</head>

<body>

  <div id="box">
    <div class="container">
    <h2>Download File</h2>

    <button id="startBtn">Start Download</button>

    <div class="progress-box">
      <div class="progress-bar" id="bar"></div>
    </div>

    <p class="percent" id="percent">0%</p>
  </div>
  </div>
<script src="downloadbarScript.js"></script>
</body>
</html>
